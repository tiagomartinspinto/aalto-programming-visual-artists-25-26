<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <title>Sketch Lab - 2024-2025 - Programming for Visual Artists</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090b0f;
        --panel: #10141b;
        --panel-2: #151a23;
        --ink: #f5f0e8;
        --muted: #aab1bd;
        --line: #2a3140;
        --accent: #ff7aa8;
        --accent-2: #7dd3fc;
        --danger: #ff5b4f;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      a { color: var(--accent); }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 14px clamp(16px, 3vw, 36px);
        border-bottom: 1px solid var(--line);
        background: rgba(9, 11, 15, 0.94);
      }

      header strong { font-size: 18px; }

      header nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: 0;
        color: var(--muted);
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 14px;
      }

      header nav::before {
        content: "/pva/2024-2025";
        margin-right: 0.25rem;
        color: var(--accent);
        font-weight: 760;
      }

      header nav a,
      header nav span {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        padding: 0 0.35rem;
        border-radius: 4px;
        text-decoration: none;
      }

      header nav a::before,
      header nav span::before {
        content: "/";
        margin-right: 0.35rem;
        color: var(--line);
      }

      header nav span {
        color: var(--ink);
        background: rgba(255, 122, 168, 0.13);
      }

      main {
        display: grid;
        grid-template-columns: minmax(320px, 0.95fr) minmax(360px, 1.05fr);
        min-height: calc(100vh - 58px);
      }

      .stage,
      .editor {
        min-width: 0;
        padding: clamp(14px, 2vw, 24px);
      }

      .stage {
        display: grid;
        grid-template-rows: auto minmax(420px, 1fr);
        gap: 14px;
        border-right: 1px solid var(--line);
      }

      .toolbar,
      .editor-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      .file-warning,
      .load-message {
        display: grid;
        gap: 6px;
        padding: 12px;
        border: 1px solid rgba(255, 91, 79, 0.5);
        border-radius: 8px;
        background: rgba(255, 91, 79, 0.08);
        color: #ffd3cf;
      }

      .file-warning[hidden] { display: none; }

      .file-warning strong,
      .load-message strong {
        color: #f5f0e8;
      }

      .load-message {
        max-width: 520px;
        margin: 18px;
        text-align: center;
      }

      select,
      button,
      textarea {
        font: inherit;
      }

      select,
      button {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel-2);
        color: var(--ink);
      }

      select { padding: 8px 10px; }

      button {
        padding: 8px 12px;
        cursor: pointer;
        font-weight: 760;
      }

      button.primary {
        border-color: rgba(255, 122, 168, 0.72);
        background: var(--accent);
        color: #12070c;
      }

      .preview-frame {
        width: 100%;
        height: 100%;
        min-height: 420px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .sketch-mount {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
      }

      .preview-frame canvas,
      .preview-frame video {
        max-width: 100%;
        max-height: 100%;
        width: auto !important;
        height: auto !important;
      }

      .editor {
        display: grid;
        grid-template-rows: auto auto minmax(440px, 1fr) auto;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 52px);
        line-height: 1;
        letter-spacing: 0;
      }

      .meta {
        margin: 8px 0 0;
        color: var(--muted);
      }

      textarea {
        width: 100%;
        height: 100%;
        min-height: 440px;
        resize: vertical;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #05070a;
        color: #f5f0e8;
        line-height: 1.45;
        tab-size: 2;
        white-space: pre;
        overflow: auto;
      }

      .status {
        min-height: 24px;
        color: var(--muted);
        font-size: 14px;
      }

      .error { color: var(--danger); }

      @media (max-width: 900px) {
        header {
          flex-direction: column;
          align-items: flex-start;
        }

        header nav {
          justify-content: flex-start;
        }

        main { grid-template-columns: 1fr; }
        .stage { border-right: 0; border-bottom: 1px solid var(--line); }
      }

  <body>
    <header>
      <strong>Sketch Lab</strong>
      <nav aria-label="Lab directory">
        <a href="../../../index.html">all-years</a>
        <a href="../index.html">2024-2025</a>
        <span aria-current="page">lab</span>
      </nav>
    </header>
    <div class="file-warning" id="file-warning" role="status" hidden>
      <strong>For class, open the Lab from GitHub Pages or a local server.</strong>
      <span>You opened it as a local file, and your browser may block the course sketch code from loading with <code>fetch()</code>.</span>
    </div>
    <main>
      <section class="stage" aria-label="Live sketch preview">
        <div class="toolbar">
          <label for="sketch-select">Choose course sketch</label>
          <select id="sketch-select"></select>
          <button class="primary" id="run-button" type="button">Run your changes</button>
          <button id="reset-button" type="button">Reset to course version</button>
        </div>
        <div id="preview" class="preview-frame" role="img" aria-label="Editable sketch preview"></div>
      </section>
      <section class="editor" aria-label="Sketch source editor">
        <div>
          <h1 id="sketch-title">Choose a course sketch</h1>
          <p class="meta" id="sketch-meta"></p>
        </div>
        <div class="editor-toolbar">
          <a id="open-page" href="#">Open sketch only</a>
          <a id="open-source" href="#">Compare Processing code</a>
        </div>
        <textarea id="code" spellcheck="false" aria-label="Editable p5.js code"></textarea>
        <div class="status" id="status" aria-live="polite"></div>
      </section>
    </main>
    <script src="vendor/p5.min.js"></script>
    <script src="sketches.js"></script>
    <script>
      const select = document.querySelector("#sketch-select");
      const preview = document.querySelector("#preview");
      const code = document.querySelector("#code");
      const status = document.querySelector("#status");
      const title = document.querySelector("#sketch-title");
      const meta = document.querySelector("#sketch-meta");
      const openPage = document.querySelector("#open-page");
      const openSource = document.querySelector("#open-source");
      const fileWarning = document.querySelector("#file-warning");
      const params = new URLSearchParams(window.location.search);
      const isFileMode = window.location.protocol === "file:";
      let currentSketch = null;
      let originalCode = "";
      let activeP5 = null;

      if (isFileMode) {
        fileWarning.hidden = false;
      }

      for (const sketch of window.COURSE_SKETCHES) {
        const option = document.createElement("option");
        option.value = sketch.id;
        option.textContent = `${sketch.session} - ${sketch.title}`;
        select.append(option);
      }

      function writeStatus(message, isError = false) {
        status.textContent = message;
        status.classList.toggle("error", isError);
      }

      function render(codeText) {
        if (activeP5) {
          activeP5.remove();
          activeP5 = null;
        }

        preview.innerHTML = '<div id="sketch" class="sketch-mount"></div>';
        const mount = preview.querySelector("#sketch");
        writeStatus("Running your sketch with the local p5.js runtime...");

        try {
          activeP5 = new p5((p) => {
            const install = new Function("p", [
              "with (p) {",
              codeText,
              "if (typeof preload === 'function') p.preload = preload;",
              "if (typeof setup === 'function') p.setup = setup;",
              "if (typeof draw === 'function') p.draw = draw;",
              "if (typeof mousePressed === 'function') p.mousePressed = mousePressed;",
              "if (typeof keyPressed === 'function') p.keyPressed = keyPressed;",
              "}"
            ].join("\n"));
            install(p);
          }, mount);
          writeStatus("Your sketch is running. Your edits stay in this browser.");
        } catch (error) {
          writeStatus(`Error: ${error.message}`, true);
        }
      }

      function showLoadProblem(error) {
        const message = isFileMode
          ? "This browser blocked the course sketch code because the Lab was opened as a local file. Use the GitHub Pages site or start a local server, then open the Lab again."
          : `The course sketch code could not be loaded: ${error.message}`;

        if (activeP5) {
          activeP5.remove();
          activeP5 = null;
        }

        preview.innerHTML = [
          '<div class="load-message">',
          "<strong>Course sketch code did not load.</strong>",
          `<span>${message}</span>`,
          "</div>"
        ].join("");
        code.value = [
          `// ${message}`,
          `// Sketch file: ${currentSketch.path}`,
          "// Your browser has not loaded editable course code yet."
        ].join("\n");
        writeStatus(message, true);
      }

      async function loadSketch(id) {
        currentSketch = window.COURSE_SKETCHES.find((sketch) => sketch.id === id) || window.COURSE_SKETCHES[0];
        select.value = currentSketch.id;
        title.textContent = currentSketch.title;
        meta.textContent = `${currentSketch.session}. ${currentSketch.notes}`;
        openPage.href = currentSketch.page;
        openSource.href = currentSketch.source;
        writeStatus("Loading the sketch code...");
        history.replaceState(null, "", `?sketch=${currentSketch.id}`);
        try {
          const response = await fetch(currentSketch.path);
          if (!response.ok) {
            throw new Error(`${response.status} ${response.statusText}`);
          }
          originalCode = await response.text();
          code.value = originalCode;
          render(originalCode);
        } catch (error) {
          originalCode = "";
          showLoadProblem(error);
        }
      }

      select.addEventListener("change", () => loadSketch(select.value));
      document.querySelector("#run-button").addEventListener("click", () => render(code.value));
      document.querySelector("#reset-button").addEventListener("click", () => {
        code.value = originalCode;
        render(originalCode);
      });

      window.addEventListener("message", (event) => {
        if (event.data && event.data.type === "sketch-running") {
          writeStatus("Your sketch is running. Your edits stay in this browser.");
        }
        if (event.data && event.data.type === "sketch-error") {
          writeStatus(`Error: ${event.data.message} at line ${event.data.line || "?"}`, true);
        }
      });

      loadSketch(params.get("sketch") || "smile-face");
    </script>
  </body>
