<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; media-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; frame-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none';">
    <link rel="icon" href="../../../../favicon.svg" type="image/svg+xml">
    <title>p5.js Example</title>
    <script src="../../web/vendor/p5.min.js"></script>
</head>
<body>
    <script>
        let circleColor;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            circleColor = color(255, 0, 0); // Initial color (red)
        }

        function draw() {
            background(30); // Dark background
            fill(circleColor);
            noStroke();
            ellipse(mouseX, mouseY, 50, 50); // Draw circle at mouse position
        }

        function mousePressed() {
            circleColor = color(random(255), random(255), random(255)); // Change color on click
        }
    </script>
</body>
</html>
