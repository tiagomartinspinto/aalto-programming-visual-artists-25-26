<!DOCTYPE html>
<html lang="zh">
<head>
    <!-- Mirrored from OpenProcessing sketch 2901374: Study 2 - Zhenzhen -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../favicon.svg" type="image/svg+xml">
    <title>Algorithmonster Generator</title>
    <script src="../../web/vendor/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* ????????? */
            background-color: #ebebeb;
            font-family: 'Helvetica', sans-serif;
        }
        canvas {
            display: block;
        }
        /* ?????????? */
        button {
            cursor: pointer;
            border: 1px solid #333;
            background: white;
            transition: all 0.2s;
            font-size: 11px;
            padding: 2px 5px;
        }
        button:hover {
            background: #000;
            color: #fff;
        }
    </style>
</head>
<body>

<script src="../study-frame-nav.js"></script>
<script>
let cols = 7; 
let rows = 7; 
let grid = [];
let targetCount; 
let spacing, offX, offY;
let padding = 100;
let showMatrix = true;

function setup() {
  createCanvas(windowWidth, windowHeight);
  createUI();
  updateTargetAndGenerate(); // ????
}

function createUI() {
  // ??????
  let btnGen = createButton('GENERATE MONSTER');
  btnGen.position(20, 20);
  btnGen.style('font-weight', 'bold');
  btnGen.mousePressed(updateTargetAndGenerate);

  // ???? (Cols)
  createLabel('Grid Cols:', 20, 60);
  createAdjustButton('-', 130, 60, () => { cols = max(3, cols - 1); updateTargetAndGenerate(); });
  createAdjustButton('+', 165, 60, () => { cols = min(40, cols + 1); updateTargetAndGenerate(); });

  // ???? (Rows)
  createLabel('Grid Rows:', 20, 90);
  createAdjustButton('-', 130, 90, () => { rows = max(3, rows - 1); updateTargetAndGenerate(); });
  createAdjustButton('+', 165, 90, () => { rows = min(40, rows + 1); updateTargetAndGenerate(); });

  // ??????
  createLabel('Black Dots:', 20, 120);
  createAdjustButton('-', 130, 120, () => { targetCount = max(1, targetCount - 2); generate(); });
  createAdjustButton('+', 165, 120, () => { targetCount = min(cols * rows, targetCount + 2); generate(); });

  createLabel('Toggle Grid:', 20, 155);
  let btnToggle = createButton('ON/OFF');
  btnToggle.position(130, 155);
  btnToggle.mousePressed(() => { showMatrix = !showMatrix; });

  let btnSave = createButton('SAVE PNG');
  btnSave.position(20, 195);
  btnSave.style('background', '#000');
  btnSave.style('color', '#fff');
  btnSave.mousePressed(() => {
    showMatrix = false; 
    draw(); 
    saveCanvas('monster_type', 'png');
  });
}

function updateTargetAndGenerate() {
  targetCount = floor((cols * rows) * 5 / 7); // 5/7 ????
  generate();
}

function createAdjustButton(label, x, y, callback) {
  let btn = createButton(label);
  btn.position(x, y);
  btn.size(32, 22);
  btn.mousePressed(callback);
}

function createLabel(txt, x, y) {
  let p = createP(txt);
  p.position(x, y - 15);
  p.style('font-family', 'Helvetica, sans-serif');
  p.style('font-size', '11px');
}

function generate() {
  grid = Array(cols).fill().map(() => Array(rows).fill(false));
  let current = 0;
  let attempts = 0;
  
  while (current < targetCount && attempts < 5000) {
    let x = floor(random(ceil(cols / 2)));
    let y = floor(random(rows));
    
    if (!grid[x][y]) {
      grid[x][y] = true;
      let mirrorX = cols - 1 - x;
      grid[mirrorX][y] = true;
      current += (x === mirrorX) ? 1 : 2;
    }
    attempts++;
  }
}

function mousePressed() {
  let i = floor((mouseX - offX) / spacing);
  let j = floor((mouseY - offY) / spacing);
  if (i >= 0 && i < cols && j >= 0 && j < rows) {
    let newState = !grid[i][j];
    grid[i][j] = newState;
    grid[cols - 1 - i][j] = newState;
  }
}

function draw() {
  background(235);
  spacing = min((width - padding*2) / cols, (height - padding*2) / rows);
  offX = (width - cols * spacing) / 2;
  offY = (height - rows * spacing) / 2;
  
  push();
  translate(offX, offY);
  
  if (showMatrix) {
    noFill(); stroke(30, 40);
    for (let i = 0; i < cols; i++) {
      for (let j = 0; j < rows; j++) {
        ellipse(i * spacing + spacing/2, j * spacing + spacing/2, spacing, spacing);
      }
    }
  }

  fill(30); stroke(30);
  for (let i = 0; i < cols - 1; i++) {
    for (let j = 0; j < rows - 1; j++) {
      if ((grid[i][j] && grid[i+1][j+1]) || (grid[i+1][j] && grid[i][j+1])) {
        drawPerfectStar((i + 1) * spacing, (j + 1) * spacing, spacing / 2);
      }
    }
  }

  noStroke();
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      if (grid[i][j]) {
        ellipse(i * spacing + spacing/2, j * spacing + spacing/2, spacing, spacing);
      }
    }
  }
  pop();
}

function drawPerfectStar(x, y, r) {
  push();
  translate(x, y);
  beginShape();
  for (let a = HALF_PI; a <= PI; a += 0.05) vertex(r + r * cos(a), -r + r * sin(a));
  for (let a = 0; a <= HALF_PI; a += 0.05) vertex(-r + r * cos(a), -r + r * sin(a));
  for (let a = 1.5 * PI; a <= TWO_PI; a += 0.05) vertex(-r + r * cos(a), r + r * sin(a));
  for (let a = PI; a <= 1.5 * PI; a += 0.05) vertex(r + r * cos(a), r + r * sin(a));
  endShape(CLOSE);
  pop();
}

function windowResized() { 
  resizeCanvas(windowWidth, windowHeight); 
}
</script>

</body>
</html>
