name: Check course site

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run repository checks
        run: npm run check

      - name: Confirm generated index is current
        run: git diff --exit-code COURSE_INDEX.md
