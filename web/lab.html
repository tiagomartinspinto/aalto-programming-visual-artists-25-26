<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sketch Lab - Programming for Visual Artists</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090b0f;
        --panel: #10141b;
        --panel-2: #151a23;
        --ink: #f5f0e8;
        --muted: #aab1bd;
        --line: #2a3140;
        --accent: #54d6c7;
        --danger: #ff5b4f;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      a { color: var(--accent); }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 14px clamp(16px, 3vw, 36px);
        border-bottom: 1px solid var(--line);
        background: rgba(9, 11, 15, 0.94);
      }

      header strong { font-size: 18px; }

      main {
        display: grid;
        grid-template-columns: minmax(320px, 0.95fr) minmax(360px, 1.05fr);
        min-height: calc(100vh - 58px);
      }

      .stage,
      .editor {
        min-width: 0;
        padding: clamp(14px, 2vw, 24px);
      }

      .stage {
        display: grid;
        grid-template-rows: auto minmax(420px, 1fr);
        gap: 14px;
        border-right: 1px solid var(--line);
      }

      .toolbar,
      .editor-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      select,
      button,
      textarea {
        font: inherit;
      }

      select,
      button {
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel-2);
        color: var(--ink);
      }

      select { padding: 8px 10px; }

      button {
        padding: 8px 12px;
        cursor: pointer;
        font-weight: 760;
      }

      button.primary {
        border-color: rgba(84, 214, 199, 0.72);
        background: var(--accent);
        color: #06100f;
      }

      iframe {
        width: 100%;
        height: 100%;
        min-height: 420px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
      }

      .editor {
        display: grid;
        grid-template-rows: auto auto minmax(440px, 1fr) auto;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 52px);
        line-height: 1;
        letter-spacing: 0;
      }

      .meta {
        margin: 8px 0 0;
        color: var(--muted);
      }

      textarea {
        width: 100%;
        height: 100%;
        min-height: 440px;
        resize: vertical;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #05070a;
        color: #f5f0e8;
        line-height: 1.45;
        tab-size: 2;
        white-space: pre;
        overflow: auto;
      }

      .status {
        min-height: 24px;
        color: var(--muted);
        font-size: 14px;
      }

      .error { color: var(--danger); }

      @media (max-width: 900px) {
        main { grid-template-columns: 1fr; }
        .stage { border-right: 0; border-bottom: 1px solid var(--line); }
      }
    </style>
  </head>
  <body>
    <header>
      <strong>Sketch Lab</strong>
      <nav><a href="../index.html">Course index</a></nav>
    </header>
    <main>
      <section class="stage" aria-label="Live sketch preview">
        <div class="toolbar">
          <label for="sketch-select">Sketch</label>
          <select id="sketch-select"></select>
          <button class="primary" id="run-button" type="button">Run code</button>
          <button id="reset-button" type="button">Reset</button>
        </div>
        <iframe id="preview" title="Editable sketch preview"></iframe>
      </section>
      <section class="editor" aria-label="Sketch source editor">
        <div>
          <h1 id="sketch-title">Loading sketch</h1>
          <p class="meta" id="sketch-meta"></p>
        </div>
        <div class="editor-toolbar">
          <a id="open-page" href="#">Open web sketch</a>
          <a id="open-source" href="#">Original Processing source</a>
        </div>
        <textarea id="code" spellcheck="false" aria-label="Editable p5.js source code"></textarea>
        <div class="status" id="status" aria-live="polite"></div>
      </section>
    </main>
    <script src="sketches.js"></script>
    <script>
      const select = document.querySelector("#sketch-select");
      const preview = document.querySelector("#preview");
      const code = document.querySelector("#code");
      const status = document.querySelector("#status");
      const title = document.querySelector("#sketch-title");
      const meta = document.querySelector("#sketch-meta");
      const openPage = document.querySelector("#open-page");
      const openSource = document.querySelector("#open-source");
      const params = new URLSearchParams(window.location.search);
      let currentSketch = null;
      let originalCode = "";

      for (const sketch of window.COURSE_SKETCHES) {
        const option = document.createElement("option");
        option.value = sketch.id;
        option.textContent = `${sketch.session} - ${sketch.title}`;
        select.append(option);
      }

      function writeStatus(message, isError = false) {
        status.textContent = message;
        status.classList.toggle("error", isError);
      }

      function render(codeText) {
        const escapedCode = codeText.replace(/<\/script/gi, "<\\/script");
        const closeScript = "</scr" + "ipt>";
        const html = `<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    body { display: grid; place-items: center; }
    canvas { max-width: 100vw; max-height: 100vh; width: auto !important; height: auto !important; }
  </style>
</head>
<body>
  <script>
    window.onerror = (message, source, line, column) => {
      parent.postMessage({ type: "sketch-error", message: String(message), line, column }, "*");
    };
    let canvas, ctx, width = 100, height = 100, frameCount = 0;
    let mouseX = 0, mouseY = 0, key = "";
    let fillStyle = "#fff", strokeStyle = "#fff", doFill = true, doStroke = true;
    let rectModeValue = "CORNER", colorModeValue = "RGB", loopEnabled = true;
    const PI = Math.PI, TWO_PI = Math.PI * 2, CENTER = "CENTER", CORNER = "CORNER", HSB = "HSB", RGB = "RGB";
    const sin = Math.sin, cos = Math.cos, pow = Math.pow, min = Math.min, max = Math.max, floor = Math.floor;
    function createCanvas(w, h) {
      width = w; height = h;
      canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.parent = (target) => {
        const parentElement = typeof target === "string" ? document.getElementById(target) : target;
        if (parentElement && parentElement.append) parentElement.append(canvas);
        return canvas;
      };
      ctx = canvas.getContext("2d");
      document.body.innerHTML = "";
      document.body.append(canvas);
      canvas.addEventListener("mousemove", (event) => {
        const rect = canvas.getBoundingClientRect();
        mouseX = (event.clientX - rect.left) * (canvas.width / rect.width);
        mouseY = (event.clientY - rect.top) * (canvas.height / rect.height);
      });
      canvas.addEventListener("mousedown", () => {
        if (typeof mousePressed === "function") mousePressed();
      });
      return canvas;
    }
    function frameRate() {}
    function noLoop() { loopEnabled = false; }
    function redraw() { if (typeof draw === "function") draw(); }
    function colorMode(mode) { colorModeValue = mode; }
    function hsbToRgb(h, s, b, a = 255) {
      s /= 100; b /= 100;
      const k = (n) => (n + h / 60) % 6;
      const f = (n) => b * (1 - s * Math.max(0, Math.min(k(n), 4 - k(n), 1)));
      return "rgba(" + [255 * f(5), 255 * f(3), 255 * f(1), a].map((v, i) => i < 3 ? Math.round(v) : v / 255).join(",") + ")";
    }
    function color(r, g, b, a = 255) {
      if (typeof r === "string") return r;
      if (g === undefined) return "rgba(" + [r, r, r, 1].join(",") + ")";
      if (b === undefined) return "rgba(" + [r, r, r, g / 255].join(",") + ")";
      return colorModeValue === HSB ? hsbToRgb(r, g, b, a) : "rgba(" + [r, g, b, a / 255].join(",") + ")";
    }
    function background(r, g, b, a = 255) { const old = ctx.fillStyle; ctx.fillStyle = color(r, g, b, a); ctx.fillRect(0, 0, width, height); ctx.fillStyle = old; }
    function fill(r, g, b, a = 255) { doFill = true; fillStyle = color(r, g, b, a); }
    function stroke(r, g, b, a = 255) { doStroke = true; strokeStyle = color(r, g, b, a); }
    function noFill() { doFill = false; }
    function noStroke() { doStroke = false; }
    function strokeWeight(value) { ctx.lineWidth = value; }
    function rectMode(value) { rectModeValue = value; }
    function paint() { if (doFill) { ctx.fillStyle = fillStyle; ctx.fill(); } if (doStroke) { ctx.strokeStyle = strokeStyle; ctx.stroke(); } }
    function ellipse(x, y, w, h = w) { ctx.beginPath(); ctx.ellipse(x, y, w / 2, h / 2, 0, 0, TWO_PI); paint(); }
    function rect(x, y, w, h) { if (rectModeValue === CENTER) { x -= w / 2; y -= h / 2; } ctx.beginPath(); ctx.rect(x, y, w, h); paint(); }
    function triangle(x1, y1, x2, y2, x3, y3) { ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x3, y3); ctx.closePath(); paint(); }
    function arc(x, y, w, h, start, stop) { ctx.beginPath(); ctx.ellipse(x, y, w / 2, h / 2, 0, start, stop); paint(); }
    function push() { ctx.save(); }
    function pop() { ctx.restore(); }
    function translate(x, y) { ctx.translate(x, y); }
    function rotate(a) { ctx.rotate(a); }
    function beginShape() { ctx.beginPath(); window.__shapeStarted = false; }
    function vertex(x, y) { if (!window.__shapeStarted) { ctx.moveTo(x, y); window.__shapeStarted = true; } else { ctx.lineTo(x, y); } }
    function endShape() { if (doStroke) { ctx.strokeStyle = strokeStyle; ctx.stroke(); } }
    function random(a, b) { if (a === undefined) return Math.random(); if (b === undefined) return Math.random() * a; return a + Math.random() * (b - a); }
    function map(value, start1, stop1, start2, stop2) { return start2 + (stop2 - start2) * ((value - start1) / (stop1 - start1)); }
    function noise(x = 0, y = 0, z = 0) {
      const value = Math.sin(x * 12.9898 + y * 78.233 + z * 37.719) * 43758.5453;
      return value - Math.floor(value);
    }
    window.addEventListener("keydown", (event) => { key = event.key; if (typeof keyPressed === "function") keyPressed(); });
  ${closeScript}
  <script>${escapedCode}${closeScript}
  <script>
    if (typeof setup === "function") setup();
    if (typeof draw === "function") draw();
    function tick() {
      frameCount++;
      if (typeof draw === "function" && loopEnabled) draw();
      requestAnimationFrame(tick);
    }
    tick();
    parent.postMessage({ type: "sketch-running" }, "*");
  ${closeScript}
</body>
</html>`;
        const previewDocument = preview.contentDocument || preview.contentWindow.document;
        previewDocument.open();
        previewDocument.write(html);
        previewDocument.close();
        const previewProgram = [...previewDocument.querySelectorAll("script")]
          .map((script) => script.textContent)
          .join("\n\n");
        try {
          preview.contentWindow.eval(previewProgram);
        } catch (error) {
          writeStatus(`Error: ${error.message}`, true);
          return;
        }
        writeStatus("Running in the browser. Changes stay local to this page.");
      }

      async function loadSketch(id) {
        currentSketch = window.COURSE_SKETCHES.find((sketch) => sketch.id === id) || window.COURSE_SKETCHES[0];
        select.value = currentSketch.id;
        title.textContent = currentSketch.title;
        meta.textContent = `${currentSketch.session}. ${currentSketch.notes}`;
        openPage.href = currentSketch.page;
        openSource.href = currentSketch.source;
        writeStatus("Loading source...");
        const response = await fetch(currentSketch.path);
        originalCode = await response.text();
        code.value = originalCode;
        render(originalCode);
        history.replaceState(null, "", `?sketch=${currentSketch.id}`);
      }

      select.addEventListener("change", () => loadSketch(select.value));
      document.querySelector("#run-button").addEventListener("click", () => render(code.value));
      document.querySelector("#reset-button").addEventListener("click", () => {
        code.value = originalCode;
        render(originalCode);
      });

      window.addEventListener("message", (event) => {
        if (event.data && event.data.type === "sketch-error") {
          writeStatus(`Error: ${event.data.message} at line ${event.data.line || "?"}`, true);
        }
      });

      loadSketch(params.get("sketch") || "face-exercise");
    </script>
  </body>
</html>
